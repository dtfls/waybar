[general]
bars = 10
framerate = 30
sensitivity = 120
lower_cutoff_freq = 50
higher_cutoff_freq = 10000

[input]
method = pulse
source = auto

[output]
method = raw
raw_target = /dev/stdout
data_format = ascii
ascii_max_range = 7
bar_delimiter = 10
channels = mono

[smoothing]
integral = 65
gravity = 100
ignore = 0
monstercat = 1
waves = 0
